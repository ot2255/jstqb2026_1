<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JSTQB CTFL 4.0 模擬試験 Variant B</title>
<style>
  body { margin:0; background:#ffffff; color:#111827;
         font-family: system-ui, -apple-system, "Segoe UI", Arial, "Hiragino Kaku Gothic ProN","Yu Gothic", sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
  .card { background:#ffffff; border:1px solid #e5e7eb; border-radius:14px; padding:14px; margin:12px 0; }
  .q { border-top:1px dashed #e5e7eb; padding:14px 0; }
  .q:first-child{border-top:0;}
  .choices label{display:block;margin:8px 0;padding:8px;border:1px solid #e5e7eb;border-radius:8px;}
  .result{margin-top:12px;padding:12px;border-radius:12px;border:1px solid #bbf7d0;background:#ecfdf5;}
  button{margin:6px;padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#f3f4f6;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
<h1>JSTQB CTFL 4.0 模擬試験（Variant B）</h1>
<div>40問 / 合格基準 65%</div>
<div id="quiz"></div>
<button onclick="submitQuiz()">提出</button>
<div id="result" class="result" style="display:none;"></div>
<button id="dl" style="display:none;" onclick="downloadTSV()">TSV保存</button>
</div>
<script>
const PASS_MARK = 65;
const QUESTIONS = [{"id": "Q1", "cat": "テストの基本", "textHtml": "テストの価値として最も適切なのはどれか。", "choices": ["欠陥がないことを証明すること", "品質を直接作り込むこと", "リスク低減に必要な情報を提供すること", "開発の代替をすること"], "answer": "C", "img": null, "explain": "テストは意思決定を支援する情報提供活動であり、リスク低減に寄与する。"}, {"id": "Q2", "cat": "テストの基本", "textHtml": "『網羅的テストは不可能』の理由として最も適切なのはどれか。", "choices": ["技術的に不可能だから", "時間・コスト制約の中で全組合せは現実的でないから", "自動化できないから", "欠陥が少ないから"], "answer": "B", "img": null, "explain": "入力や状態の組合せは膨大で、現実的には代表選択が必要。"}, {"id": "Q3", "cat": "テストの基本", "textHtml": "欠陥の偏在に基づく行動として最も適切なのはどれか。", "choices": ["全領域を均等にテストする", "過去障害の多い領域を重点的にテストする", "重点化を避ける", "テストを減らす"], "answer": "B", "img": null, "explain": "欠陥集中領域に資源を集中するのが合理的。"}, {"id": "Q4", "cat": "テストの基本", "textHtml": "『バグゼロの誤謬』の説明として最も適切なのはどれか。", "choices": ["重大欠陥があれば出荷しない", "欠陥が見つからない＝品質が高いと判断する誤り", "早期テストは不要", "回帰テストは無意味"], "answer": "B", "img": null, "explain": "検出されない欠陥や未検証領域が存在し得る。"}, {"id": "Q5", "cat": "テストの基本", "textHtml": "テストの独立性を高める利点として最も適切なのはどれか。", "choices": ["開発スピード向上", "客観的視点による欠陥検出率向上", "自動化率向上", "文書削減"], "answer": "B", "img": null, "explain": "独立性が高いほどバイアスが減り欠陥発見率が上がる傾向。"}, {"id": "Q6", "cat": "テストの基本", "textHtml": "テスト完了の判断に単一指標だけを用いることの問題点として最も適切なのはどれか。", "choices": ["管理が複雑になる", "品質を多面的に評価できない", "自動化できない", "工数が増える"], "answer": "B", "img": null, "explain": "欠陥数だけ等では不十分で、複数基準の合意が必要。"}, {"id": "Q7", "cat": "テストの基本", "textHtml": "テストとデバッグの違いとして最も適切なのはどれか。", "choices": ["両者は同じ活動", "テストは原因特定、デバッグは欠陥検出", "テストは欠陥検出、デバッグは原因特定と修正", "デバッグは管理活動"], "answer": "C", "img": null, "explain": "テスト＝検出、デバッグ＝原因特定と修正。"}, {"id": "Q8", "cat": "テストの基本", "textHtml": "『テストは状況依存』を最もよく示す例はどれか。", "choices": ["全製品で同じテスト戦略を使う", "安全系製品では厳格な証跡とレビューが必要", "常に探索的テストのみ行う", "常に自動化中心にする"], "answer": "B", "img": null, "explain": "ドメインやリスクにより最適なアプローチは変わる。"}, {"id": "Q9", "cat": "SDLCとテスト", "textHtml": "統合テストの主目的として最も適切なのはどれか。", "choices": ["要件の妥当性確認", "インタフェースの不整合検出", "UIの見た目確認", "ユーザ受入確認"], "answer": "B", "img": null, "explain": "結合点やデータ連携の誤り検出が主目的。"}, {"id": "Q10", "cat": "SDLCとテスト", "textHtml": "受入テストの主な視点はどれか。", "choices": ["コード網羅", "内部設計妥当性", "利用者・業務要求の充足", "分岐網羅"], "answer": "C", "img": null, "explain": "利用者視点での妥当性評価。"}, {"id": "Q11", "cat": "SDLCとテスト", "textHtml": "回帰テストの目的はどれか。", "choices": ["修正確認", "変更による副作用の検出", "性能測定", "静的解析"], "answer": "B", "img": null, "explain": "変更の影響確認が主目的。"}, {"id": "Q12", "cat": "シナリオ（長文）", "textHtml": "【長文】ECサイトで検索機能を改修し、検索条件を複数同時指定できるようにした。\n過去には検索ロジック変更時に『特定条件の組合せで結果が0件になる』障害が発生している。\n今回は時間が限られている。\n最も適切なテスト戦略はどれか。", "choices": ["全機能を均等に薄くテストする", "デシジョンテーブルやペアワイズを用いて条件組合せを重点的に設計し、リスク領域を厚くする", "UIだけを確認する", "単体テストに任せる"], "answer": "B", "img": null, "explain": "組合せリスクが高いため、条件組合せ技法で重点的に設計する。"}, {"id": "Q13", "cat": "SDLCとテスト", "textHtml": "非機能テストの例として最も適切なのはどれか。", "choices": ["税計算ロジック確認", "入力必須確認", "高負荷時の応答時間測定", "状態遷移確認"], "answer": "C", "img": null, "explain": "性能は代表的な非機能。"}, {"id": "Q14", "cat": "SDLCとテスト", "textHtml": "Vモデルの特徴として最も適切なのはどれか。", "choices": ["テストは最後のみ実施", "各開発工程に対応したテストレベルを計画する", "単体テスト不要", "受入のみ重要"], "answer": "B", "img": null, "explain": "開発工程に対応するテストを計画する。"}, {"id": "Q15", "cat": "アジャイル", "textHtml": "アジャイルにおけるテストの特徴はどれか。", "choices": ["最後にまとめて実施", "各イテレーションに組み込まれる", "QA部門のみ担当", "計画不要"], "answer": "B", "img": null, "explain": "継続的テストが基本。"}, {"id": "Q16", "cat": "SDLCとテスト", "textHtml": "確認テストの目的はどれか。", "choices": ["副作用検出", "修正欠陥が直ったこと確認", "性能測定", "網羅率向上"], "answer": "B", "img": null, "explain": "当該欠陥の修正確認。"}, {"id": "Q17", "cat": "SDLCとテスト", "textHtml": "変更関連テストに含まれるものはどれか。", "choices": ["回帰テスト", "負荷テスト", "互換性テスト", "ユーザビリティテスト"], "answer": "A", "img": null, "explain": "回帰は変更関連テスト。"}, {"id": "Q18", "cat": "SDLCとテスト", "textHtml": "テストベースとして適切なのはどれか。", "choices": ["コンパイルログ", "要求仕様書", "欠陥報告のみ", "ビルドスクリプト"], "answer": "B", "img": null, "explain": "要求・設計などがテストベース。"}, {"id": "Q19", "cat": "静的テスト", "textHtml": "静的テストの利点はどれか。", "choices": ["実行が必要", "早期低コスト検出", "環境構築不要で欠陥ゼロ", "性能向上保証"], "answer": "B", "img": null, "explain": "早期検出が利点。"}, {"id": "Q20", "cat": "静的テスト", "textHtml": "モデレータの役割はどれか。", "choices": ["修正担当", "会議進行管理", "欠陥承認", "自動生成"], "answer": "B", "img": null, "explain": "進行と手順管理。"}, {"id": "Q21", "cat": "静的テスト", "textHtml": "インスペクションの特徴はどれか。", "choices": ["非公式", "役割明確で形式的", "自動化中心", "顧客主導"], "answer": "B", "img": null, "explain": "形式的レビュー。"}, {"id": "Q22", "cat": "静的テスト", "textHtml": "静的解析で検出しやすいものはどれか。", "choices": ["要求不足", "未使用変数", "UX低下", "運用手順不足"], "answer": "B", "img": null, "explain": "コードレベル欠陥。"}, {"id": "Q23", "cat": "静的テスト", "textHtml": "レビューの主目的はどれか。", "choices": ["修正完了", "欠陥収集と合意", "評価", "実行"], "answer": "B", "img": null, "explain": "収集と合意。"}, {"id": "Q24", "cat": "テスト技法", "textHtml": "同値分割の目的はどれか。", "choices": ["全組合せ", "代表値で効率化", "境界のみ", "分岐網羅"], "answer": "B", "img": null, "explain": "同値クラスで効率化。"}, {"id": "Q25", "cat": "テスト技法", "textHtml": "境界値分析で重視するのはどれか。", "choices": ["中央値", "境界内外", "乱数", "最大値のみ"], "answer": "B", "img": null, "explain": "境界付近。"}, {"id": "Q26", "cat": "テスト技法", "textHtml": "状態遷移テストが有効なのはどれか。", "choices": ["入力範囲のみ", "状態とイベントで振る舞いが変わる場合", "UIのみ", "性能"], "answer": "B", "img": null, "explain": "状態依存振る舞いに有効。"}, {"id": "Q27", "cat": "ホワイトボックス", "textHtml": "ステートメント100%で保証されないものはどれか。", "choices": ["文実行", "分岐両結果", "実行可能文網羅", "テスト存在"], "answer": "B", "img": null, "explain": "分岐は保証しない。"}, {"id": "Q28", "cat": "ホワイトボックス", "textHtml": "ブランチ100%の説明はどれか。", "choices": ["条件両真偽", "分岐結果両方", "全パス", "全入力"], "answer": "B", "img": null, "explain": "分岐両結果。"}, {"id": "Q29", "cat": "経験ベース", "textHtml": "エラー推測とはどれか。", "choices": ["仕様網羅", "経験で欠陥予測", "分岐網羅", "境界のみ"], "answer": "B", "img": null, "explain": "経験に基づく。"}, {"id": "Q30", "cat": "テスト技法", "textHtml": "デシジョンテーブルの利点はどれか。", "choices": ["境界専用", "条件組合せ整理", "コード網羅", "探索代替"], "answer": "B", "img": null, "explain": "組合せ整理。"}, {"id": "Q31", "cat": "テスト技法", "textHtml": "ペアワイズの狙いはどれか。", "choices": ["全組合せ", "2因子網羅", "境界確認", "分岐網羅"], "answer": "B", "img": null, "explain": "2因子相互作用。"}, {"id": "Q32", "cat": "テスト技法", "textHtml": "探索的テストの特徴はどれか。", "choices": ["固定手順のみ", "設計と実行を同時進行", "自動化必須", "回帰専用"], "answer": "B", "img": null, "explain": "学習・設計・実行同時。"}, {"id": "Q33", "cat": "テスト技法", "textHtml": "原因結果グラフの利点はどれか。", "choices": ["境界専用", "論理関係整理", "性能測定", "UI確認"], "answer": "B", "img": null, "explain": "論理構造整理。"}, {"id": "Q34", "cat": "テスト管理", "textHtml": "リスク評価で用いる組合せはどれか。", "choices": ["影響×確率", "工数×人数", "欠陥数×件数", "自動化率×速度"], "answer": "A", "img": null, "explain": "一般に影響と確率。"}, {"id": "Q35", "cat": "シナリオ（長文）", "textHtml": "【長文】決済機能改修で、成功・失敗・タイムアウト・二重送信防止ロジックが変更された。\n過去にはタイムアウト時の在庫戻し漏れが重大障害となった。\n回帰時間は限られている。\n最も適切な方針はどれか。", "choices": ["全機能均等", "決済と在庫境界を重点化し、主要フローを厚く回帰", "UIのみ確認", "テスト不要"], "answer": "B", "img": null, "explain": "高リスク領域を重点化するのがRBT。"}, {"id": "Q36", "cat": "テスト管理", "textHtml": "出口基準の例はどれか。", "choices": ["期限到達", "重大欠陥所定以下＋カバレッジ達成", "開発完了", "担当者了承"], "answer": "B", "img": null, "explain": "複数合意基準。"}, {"id": "Q37", "cat": "テスト管理", "textHtml": "トレーサビリティの利点はどれか。", "choices": ["自動化不要", "影響分析可能", "性能向上", "UI改善"], "answer": "B", "img": null, "explain": "要求↔テスト↔欠陥紐付け。"}, {"id": "Q38", "cat": "シナリオ（長文）", "textHtml": "【長文】ログインAPIに対し短時間で多数の失敗ログインが観測された。\nセキュリティ観点で最も適切なテストはどれか。", "choices": ["配色確認", "アカウントロック・レート制限・監査ログ確認", "SQL最適化", "文言確認"], "answer": "B", "img": null, "explain": "ブルートフォース対策確認。"}, {"id": "Q39", "cat": "テストツール", "textHtml": "自動化導入時のリスクはどれか。", "choices": ["速度向上", "Flaky増加", "欠陥ゼロ", "設計不要"], "answer": "B", "img": null, "explain": "保守不足で不安定化。"}, {"id": "Q40", "cat": "シナリオ（長文）", "textHtml": "【長文】UI自動化が頻繁な画面変更で壊れやすく、回帰が止まる。\n一方APIは安定している。\n最も適切な自動化方針はどれか。", "choices": ["UIをさらに増やす", "API層中心に自動化しUIは最小限に絞る", "自動化廃止", "探索を全自動化"], "answer": "B", "img": null, "explain": "安定層中心に自動化するのが保守性向上に有効。"}];
const root=document.getElementById("quiz");

QUESTIONS.forEach((q,i)=>{
  const div=document.createElement("div");
  div.className="q";
  div.innerHTML="<b>Q"+(i+1)+"</b> ["+q.cat+"]<br>"+q.textHtml.replace(/\n/g,"<br>");
  const ch=document.createElement("div");
  ch.className="choices";
  q.choices.forEach((c,idx)=>{
    const val=String.fromCharCode(65+idx);
    const lab=document.createElement("label");
    lab.innerHTML=`<input type="radio" name="${q.id}" value="${val}"> ${val}. ${c}`;
    ch.appendChild(lab);
  });
  div.appendChild(ch);
  root.appendChild(div);
});

function submitQuiz(){
  let correct=0;
  const details=[];
  QUESTIONS.forEach((q,i)=>{
    const sel=document.querySelector('input[name="'+q.id+'"]:checked');
    const u=sel?sel.value:"";
    if(u===q.answer) correct++;
    details.push([`Q${i+1}`,q.cat,u,q.answer,(u===q.answer)?"○":"×",q.explain]);
  });
  const pct=Math.round(correct/QUESTIONS.length*100);
  const passed=pct>=PASS_MARK;
  const res=document.getElementById("result");
  res.style.display="block";
  res.innerHTML=`正解数: ${correct} / ${QUESTIONS.length}<br>正答率: ${pct}%<br>判定: ${passed?"合格":"不合格"}`;
  window.__RESULT={details,date:new Date().toLocaleString(),correct,total:QUESTIONS.length,pct,passed};
  document.getElementById("dl").style.display="inline-block";
}

function downloadTSV(){
  const r=window.__RESULT;
  const rows=[["日時","正解数","合計","正答率","判定"],
              [r.date,r.correct,r.total,r.pct+"%",r.passed?"合格":"不合格"],
              [],
              ["問","分類","あなたの解答","正解","正誤","解説"]];
  r.details.forEach(d=>rows.push(d));
  const tsv=rows.map(r=>r.join("\t")).join("\n");
  const blob=new Blob(["\ufeff"+tsv],{type:"text/tab-separated-values;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="JSTQB_CTFL4_variantB_result.tsv";
  a.click();
}
</script>
</body>
</html>
